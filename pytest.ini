[pytest]
# Marcadores para poder correr E2E y API por separado:
#   pytest -m e2e      -> solo pruebas de interfaz (Selenium)
#   pytest -m api      -> solo pruebas de servicios REST (requests)
markers =
    e2e: pruebas end-to-end de interfaz con Selenium
    api: pruebas de servicios REST con requests

addopts = -v --strict-markers --html=reports/report.html --self-contained-html
pythonpath = .
testpaths =
    e2e_tests
    api_tests
