name: API Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  api:
    name: PetStore API
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PETSTORE_API_BASE_URL: "https://petstore3.swagger.io/api/v3"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        run: pytest -m api

      - name: Upload API reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-reports-${{ github.run_number }}
          path: reports/
          if-no-files-found: ignore
